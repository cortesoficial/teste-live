<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream | Rádio Cocal Oficial</title>
    <style>
        :root {
            --bg-deep: #0a0f18;
            --panel-bg: #161e2d;
            --accent: #10b981; /* Verde Esmeralda */
            --text: #e2e8f0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 95%;
            max-width: 900px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d3748;
        }

        .header-live {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444; /* Vermelho Live */
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Container do Video para manter proporção 16:9 */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-info {
            margin-top: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: #718096;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-live">
        <span style="font-weight: 600; letter-spacing: 1px;">RÁDIO COCAL OFICIAL</span>
        <div class="live-indicator">
            <div class="dot"></div>
            AO VIVO
        </div>
    </div>

    <div class="video-container">
        <iframe 
            src="https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/RadioCocalOficial/live/&show_text=0&autoplay=1" 
            scrolling="no" 
            allowfullscreen="true" 
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
    </div>

    <div class="footer-info">
        A transmissão iniciará automaticamente assim que o perfil estiver online.
    </div>
</div>

<script>
    // Atualiza o frame a cada 10 minutos para garantir que ele pegue o início de uma nova live
    setInterval(function() {
        const frame = document.querySelector('iframe');
        const url = frame.src;
        frame.src = '';
        frame.src = url;
    }, 600000); 
</script>

</body>
</html>
