<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Monitor | Live Dash</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #10b981; /* Esmeralda Industrial */
            --text-color: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 2px solid var(--accent-color);
            margin-bottom: 2rem;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-bar {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .indicator {
            width: 12px;
            height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
    </style>
</head>
<body>

<header>
    <h1>PAINEL DE TRANSMISSÃO</h1>
    <p>Monitoramento Automático de Live</p>
</header>

<div class="container">
    <div class="video-wrapper">
        <iframe 
            src="https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/SEU_PERFIL_OU_PAGINA/live/&show_text=0" 
            scrolling="no" 
            allowfullscreen="true" 
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
    </div>

    <div class="status-bar">
        <div class="indicator"></div>
        <span id="status-text">Sincronizado com Facebook Live</span>
    </div>
</div>

<script>
    // Função para recarregar o iframe a cada 5 minutos 
    // Isso força o check de nova live se o usuário deixar a página aberta
    setInterval(function() {
        const iframe = document.querySelector('iframe');
        const currentSrc = iframe.src;
        iframe.src = '';
        iframe.src = currentSrc;
        console.log("Monitorando nova transmissão...");
    }, 300000); // 300.000ms = 5 min
</script>

</body>
</html>
